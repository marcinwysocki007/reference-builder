# Render Blueprint — one-click deploy.
# Creates a Postgres database, a Web Service, and a 1 GB persistent disk
# mounted at /var/data for caregiver photos, uploaded documents, and
# generated export PDFs.
#
# After connecting this repo on Render:
#   1. Render Dashboard → "New" → "Blueprint" → pick this repo
#   2. Render creates DB + service + disk automatically
#   3. Set the secret env vars (ANTHROPIC_API_KEY) in the service settings
#   4. Wait ~5 min for first deploy
#
# See DEPLOY.md for the step-by-step.

databases:
  - name: pk-referenzen-db
    plan: free  # 90-day trial; upgrade to "basic-256mb" ($7/mo) for prod
    databaseName: pkreferenzen
    user: pkreferenzen

services:
  - type: web
    name: pk-referenzen
    runtime: node
    plan: starter  # $7/mo — needed for persistent disk + always-on
    region: frankfurt  # closest EU region for low latency to PL/DE users
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: storage
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        fromDatabase:
          name: pk-referenzen-db
          property: connectionString
      # Where uploaded files live on the persistent disk.
      - key: STORAGE_DIR
        value: /var/data/storage
      # AI keys — set manually in Render dashboard (don't commit secrets).
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_VISION_MODEL
        value: claude-opus-4-7
      # Branding (Vitanas defaults — edit in dashboard for other orgs).
      - key: BRAND_TOOL_NAME
        value: "Vitanas · Referenzen"
      - key: BRAND_PDF_NAME
        value: Vitanas
      - key: BRAND_PDF_FOOTER_URL
        value: vitanas.pl
      - key: BRAND_PDF_LOGO_PATH
        value: ./public/brand/vitanas-logo-white.png
      - key: BRAND_PRIMARY
        value: "#E17369"
      - key: BRAND_PRIMARY_SOFT
        value: "#F1B5B0"
      - key: BRAND_PRIMARY_TINT
        value: "#FBE5E2"
